<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Smart Health</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
            position: relative;
            min-height: 100vh;
        }

        /* Animated Background Elements */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 80%, rgba(78, 205, 196, 0.3) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(255, 107, 107, 0.3) 0%, transparent 50%),
                        radial-gradient(circle at 40% 40%, rgba(254, 202, 87, 0.2) 0%, transparent 50%);
            animation: bgPulse 8s ease-in-out infinite;
            z-index: -2;
            pointer-events: none;
        }

        @keyframes bgPulse {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        .lines-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(90deg, transparent 98%, rgba(78, 205, 196, 0.1) 100%),
                linear-gradient(0deg, transparent 98%, rgba(255, 107, 107, 0.1) 100%);
            background-size: 50px 2px, 30px 1px;
            animation: lineMove 25s linear infinite;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes lineMove {
            0% { transform: translateX(-100%) translateY(-100%) rotate(0deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(360deg); }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .particles::before,
        .particles::after {
            content: '';
            position: absolute;
            width: 4px;
            height: 4px;
            background: linear-gradient(45deg, #4ecdc4, #ff6b6b);
            border-radius: 50%;
            animation: particleFloat 15s linear infinite;
        }

        .particles::before {
            top: 20%;
            left: 10%;
            animation-delay: 0s;
        }

        .particles::after {
            top: 80%;
            right: 20%;
            animation-delay: 7s;
            animation-duration: 12s;
        }

        @keyframes particleFloat {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        /* Navbar */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(30px);
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            transform: translateY(-100%);
            animation: slideDown 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.5s forwards;
        }

        @keyframes slideDown {
            to { transform: translateY(0); }
        }

        .logo {
            font-size: clamp(1.5rem, 3vw, 2rem);
            font-weight: 900;
            background: linear-gradient(135deg, #4ecdc4, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            transform-style: preserve-3d;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        .nav-links a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            transform-style: preserve-3d;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .nav-links a:hover {
            color: white;
            transform: rotateX(10deg) scale(1.05) translateZ(20px);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .nav-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .btn {
            padding: 0.75rem 2rem;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.6s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4ecdc4, #44a08d, #2d8b79);
            color: white;
            box-shadow: 0 10px 30px rgba(78, 205, 196, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-12px) rotateX(20deg) scale(1.08);
            box-shadow: 0 25px 50px rgba(78, 205, 196, 0.6);
        }

        .btn-outline {
            background: transparent;
            color: rgba(255, 255, 255, 0.9);
            border: 2px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-8px) rotateX(15deg) scale(1.05);
        }

        .btn-red {
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            color: white;
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.4);
        }

        .btn-red:hover {
            transform: translateY(-12px) rotateX(20deg) scale(1.08);
            box-shadow: 0 25px 50px rgba(255, 107, 107, 0.6);
        }

        /* Main Content */
        .main-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            z-index: 10;
        }

        /* Header Section */
        .header-section {
            text-align: center;
            margin-bottom: 4rem;
            animation: heroFloat 7s ease-in-out infinite;
            transform-style: preserve-3d;
        }

        @keyframes heroFloat {
            0%, 100% { transform: translateY(0px) rotateX(0deg); }
            50% { transform: translateY(-20px) rotateX(2deg); }
        }

        .medical-icon {
            font-size: clamp(4rem, 10vw, 6rem);
            background: linear-gradient(135deg, #4ecdc4, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1.5rem;
            display: block;
            animation: heartBeat 2s ease-in-out infinite;
            transform-style: preserve-3d;
        }

        @keyframes heartBeat {
            0%, 100% { transform: scale(1) rotate(-2deg); }
            50% { transform: scale(1.1) rotate(2deg); }
        }

        .header-section h1 {
            font-size: clamp(3rem, 6vw, 5.5rem);
            font-weight: 900;
            background: linear-gradient(135deg, #ffffff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            line-height: 1.1;
            position: relative;
        }

        .header-section h1::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background: linear-gradient(90deg, transparent, #4ecdc4, #ff6b6b, #feca57, transparent);
            border-radius: 2px;
            animation: lineGlow 2s ease-in-out infinite;
        }

        @keyframes lineGlow {
            0%, 100% { box-shadow: 0 0 10px #4ecdc4; }
            50% { box-shadow: 0 0 30px #ff6b6b, 0 0 40px #feca57; }
        }

        .header-section p {
            font-size: clamp(1.1rem, 2.5vw, 1.5rem);
            font-weight: 300;
            color: rgba(255, 255, 255, 0.8);
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* Form Section */
        .form-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: clamp(3rem, 5vw, 5rem);
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            transform-style: preserve-3d;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .form-container:hover {
            transform: translateY(-10px) rotateX(5deg);
        }

        .form-group {
            margin-bottom: 2rem;
            position: relative;
        }

        .form-group input {
            width: 100%;
            padding: 1.25rem 1rem 1.25rem 3.5rem;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            color: white;
            font-size: 1rem;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            backdrop-filter: blur(20px);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .form-group input:focus {
            outline: none;
            border-color: #4ecdc4;
            box-shadow: 0 0 0 4px rgba(78, 205, 196, 0.2);
            background: rgba(255, 255, 255, 0.12);
        }

        .form-icon {
            position: absolute;
            left: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.25rem;
            color: rgba(78, 205, 196, 0.7);
            z-index: 2;
        }

        /* Primary Action Button */
        .form-actions {
            text-align: center;
            margin-top: 2rem;
        }

        .btn-create {
            width: 100%;
            padding: 1.25rem;
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
        }

        /* Footer Link */
        .login-link {
            text-align: center;
        }

        .login-link span {
            color: rgba(255, 255, 255, 0.6);
            font-weight: 500;
            font-size: 0.95rem;
        }

        .login-link a {
            color: #4ecdc4;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .login-link a:hover {
            color: #ff6b6b;
            text-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                padding: 1rem 3%;
                flex-direction: column;
                gap: 1rem;
            }

            .nav-links {
                gap: 1rem;
            }

            .nav-actions {
                flex-direction: column;
                width: 100%;
                gap: 0.75rem;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }

            .main-container {
                padding: 1rem;
            }

            .form-container {
                padding: 2rem;
                margin: 2rem 1rem;
            }
        }

        @media (max-width: 480px) {
            .header-section {
                margin-bottom: 2rem;
            }

            .header-section h1 {
                line-height: 1;
            }
        }
    </style>
</head>
<body>
    <!-- Background Elements -->
    <div class="lines-bg"></div>
    <div class="particles"></div>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">Smart Health</div>
        <ul class="nav-links">
            <li><a href="#home">Home</a></li>
            <li><a href="#features">Features</a></li>
            <li><a href="#about">About</a></li>
        </ul>
        <div class="nav-actions">
            <button class="btn btn-outline">Login</button>
            <button class="btn btn-red">Sign Up</button>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-container">
        <!-- Header Section -->
        <div class="header-section">
            <div class="medical-icon">💓</div>
            <h1>Create an account</h1>
            <p>Join us for smarter healthcare management</p>
        </div>

        <!-- Registration Form -->
        <div class="form-container">
            <form id="signupForm">
                <div class="form-group">
                    <span class="form-icon">👤</span>
                    <input type="text" id="fullName" placeholder="Full Name" required>
                </div>
                
                <div class="form-group">
                    <span class="form-icon">✉️</span>
                    <input type="email" id="email" placeholder="Email address" required>
                </div>
                
                <div class="form-group">
                    <span class="form-icon">🔒</span>
                    <input type="password" id="password" placeholder="Password (min 6 chars)" minlength="6" required>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary btn-create btn-create-account">
                        Create account →
                    </button>
                </div>
            </form>

            <div class="login-link">
                <span>Already have an account? </span>
                <a href="login2.html">Log in</a>
            </div>
        </div>
    </div>

    <script>
        // Form validation and submission handler
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            // Validation
            let isValid = true;
            let errorMessage = '';
            
            // Full name validation
            if (fullName.length < 2) {
                isValid = false;
                errorMessage = 'Full name must be at least 2 characters long';
            }
            // Email validation
            else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                isValid = false;
                errorMessage = 'Please enter a valid email address';
            }
            // Password validation
            else if (password.length < 6) {
                isValid = false;
                errorMessage = 'Password must be at least 6 characters long';
            }
            
            if (!isValid) {
                showNotification(errorMessage, 'error');
                return;
            }
            
            // Simulate API call
            const submitBtn = document.querySelector('.btn-create-account');
            const originalText = submitBtn.innerHTML;
            
            submitBtn.innerHTML = 'Creating account...';
            submitBtn.disabled = true;
            
            // Simulate loading
            setTimeout(() => {
                // Success simulation
                showNotification('Account created successfully! Redirecting to login...', 'success');
                
                setTimeout(() => {
                    // In real app, redirect to login page
                    window.location.href = '#login';
                }, 1500);
                
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }, 2000);
        });
        
        // Notification system
        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 100px;
                right: 20px;
                padding: 1rem 1.5rem;
                border-radius: 15px;
                color: white;
                font-weight: 600;
                font-family: 'Inter', sans-serif;
                backdrop-filter: blur(20px);
                border: 1px solid rgba(255,255,255,0.2);
                transform: translateX(400px);
                transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
                z-index: 10000;
                max-width: 350px;
                box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            `;
            
            if (type === 'success') {
                notification.style.background = 'rgba(78, 205, 196, 0.2)';
                notification.style.borderColor = '#4ecdc4';
            } else if (type === 'error') {
                notification.style.background = 'rgba(255, 107, 107, 0.2)';
                notification.style.borderColor = '#ff6b6b';
            }
            
            notification.textContent = message;
            document.body.appendChild(notification);
            
            // Animate in
            requestAnimationFrame(() => {
                notification.style.transform = 'translateX(0)';
            });
            
            // Auto remove
            setTimeout(() => {
                notification.style.transform = 'translateX(400px)';
                setTimeout(() => {
                    if (notification.parentNode) {
                        notification.parentNode.removeChild(notification);
                    }
                }, 400);
            }, 4000);
        }
        
        // Input focus animations
        document.querySelectorAll('.form-group input').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.style.transform = 'scale(1.02)';
            });
            
            input.addEventListener('blur', function() {
                this.parentElement.style.transform = 'scale(1)';
            });
        });
        
        // Login link handler
        document.querySelector('.login-link a').addEventListener('click', function(e) {
            e.preventDefault();
            showNotification('Redirecting to login page...', 'info');
            // In real app: window.location.href = '/login';
        });
        
        // Navbar scroll effect
        window.addEventListener('scroll', () => {
            const navbar = document.querySelector('.navbar');
            if (window.scrollY > 50) {
                navbar.style.background = 'rgba(255, 255, 255, 0.1)';
                navbar.style.backdropFilter = 'blur(40px)';
                navbar.style.boxShadow = '0 10px 30px rgba(0,0,0,0.3)';
            } else {
                navbar.style.background = 'rgba(255, 255, 255, 0.05)';
                navbar.style.backdropFilter = 'blur(30px)';
                navbar.style.boxShadow = 'none';
            }
        });
        
        // Add floating animation to form container on load
        window.addEventListener('load', () => {
            const formContainer = document.querySelector('.form-container');
            formContainer.style.animation = 'heroFloat 6s ease-in-out infinite';
        });
    </script>
</body>
</html>
